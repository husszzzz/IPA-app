name: Build MoonManager IPA
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Setup Theos
        run: |
          rm -rf ~/theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Application
        run: |
          export THEOS=~/theos
          make clean all

      - name: Force IPA Structure
        run: |
          # تنظيف أي محاولات سابقة
          rm -rf Payload MoonManager.ipa
          mkdir -p Payload
          
          # البحث عن المجلد الذي ينتهي بـ .app داخل مجلد المشروع
          # المسار غالباً يكون في .theos/obj/debug أو .theos/obj/
          APP_FOLDER=$(find . -name "*.app" -type d | grep -v "theos/" | head -n 1)
          
          if [ -z "$APP_FOLDER" ]; then
            # إذا لم يجده في الخارج، يبحث داخل مجلد .theos
            APP_FOLDER=$(find .theos/obj/ -name "*.app" -type d | head -n 1)
          fi
          
          echo "Found App at: $APP_FOLDER"
          
          # نسخ المجلد وتغيير الأذونات لضمان عمله
          cp -R "$APP_FOLDER" Payload/
          chmod -R 755 Payload/
          
          # ضغط المجلد بطريقة متوافقة مع الأيفون
          zip -r MoonManager.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: MoonManager-Final-Ready
          path: MoonManager.ipa
