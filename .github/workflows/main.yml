name: Build MoonManager IPA
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Setup Theos
        run: |
          rm -rf ~/theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Application
        run: |
          export THEOS=~/theos
          make clean all

      - name: Prepare IPA
        run: |
          # إنشاء مجلد الـ Payload وضبط الملفات
          mkdir -p Payload
          # البحث عن مجلد التطبيق الناتج ونقله
          APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          # ضغط المجلد وتحويله إلى IPA
          zip -r MoonManager.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoonManager-Ready-IPA
          path: MoonManager.ipa
