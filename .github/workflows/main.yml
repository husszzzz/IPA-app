name: Build HassanyBoost

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Build App
      run: |
        export THEOS=~/theos
        make package

    - name: Create IPA
      run: |
        mkdir -p Payload/HassanyBoost.app
        # هذا السطر يبحث عن الملف التنفيذي وينسخه مهما كان مكانه
        find .theos/obj -name "HassanyBoost" -exec cp {} Payload/HassanyBoost.app/ \;
        
        cat <<EOF > Payload/HassanyBoost.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>HassanyBoost</string>
            <key>CFBundleIdentifier</key>
            <string>com.hassany.boost100x</string>
            <key>CFBundleName</key>
            <string>Hassany</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>UIBackgroundModes</key>
            <array>
                <string>audio</string>
            </array>
            <key>NSMicrophoneUsageDescription</key>
            <string>نحتاج المايك للتضخيم</string>
            <key>MinimumOSVersion</key>
            <string>14.0</string>
        </dict>
        </plist>
        EOF
        
        zip -r HassanyBoost.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: HassanyBoost-Final
        path: HassanyBoost.ipa
