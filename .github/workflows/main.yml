name: Build Pure Audio

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Build Application
      run: |
        export THEOS=~/theos
        make package

    - name: Create IPA
      run: |
        mkdir -p Payload/HassanySound.app
        # نسخ الملف التنفيذي المولد
        find .theos/obj -name "HassanyBoost" -exec cp {} Payload/HassanySound.app/ \;
        
        # إنشاء ملف Info.plist لإصلاح خطأ المسار في صورك
        cat <<EOF > Payload/HassanySound.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>HassanyBoost</string>
            <key>CFBundleIdentifier</key>
            <string>com.hassany.puresound</string>
            <key>CFBundleName</key>
            <string>PureBoost</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>NSMicrophoneUsageDescription</key>
            <string>نحتاج المايك لتضخيم الصوت</string>
            <key>UIBackgroundModes</key>
            <array><string>audio</string></array>
            <key>MinimumOSVersion</key>
            <string>14.0</string>
        </dict>
        </plist>
        EOF
        
        zip -r PureBoost.ipa Payload

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: Hassany-Pure-App
        path: PureBoost.ipa
