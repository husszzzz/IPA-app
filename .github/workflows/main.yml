name: Build MoonManager IPA
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install ldid

      - name: Setup Theos
        run: |
          rm -rf ~/theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Application
        run: |
          export THEOS=~/theos
          make clean all

      - name: Create Valid IPA Structure
        run: |
          # 1. إنشاء المجلد الأساسي الذي يحتاجه الأيفون
          mkdir -p Payload
          
          # 2. البحث عن مجلد .app الناتج من عملية البناء
          APP_PATH=$(find .theos/obj/ -name "*.app" -type d | head -n 1)
          
          # 3. نسخ مجلد التطبيق إلى داخل مجلد Payload
          cp -r "$APP_PATH" Payload/
          
          # 4. ضغط المجلد بصيغة IPA صحيحة
          zip -vr MoonManager.ipa Payload/

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: MoonManager-Fixed-IPA
          path: MoonManager.ipa
