name: Build MoonHearBoost

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Build App
      run: |
        export THEOS=~/theos
        make package

    - name: Create IPA
      run: |
        # ملاحظة: الاسم هنا يجب أن يطابق APPLICATION_NAME في الـ Makefile
        APP_NAME="MoonHearBoost"
        mkdir -p Payload/$APP_NAME.app
        cp .theos/obj/$APP_NAME.app/$APP_NAME Payload/$APP_NAME.app/
        
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>MoonHearBoost</string>
            <key>CFBundleIdentifier</key>
            <string>com.huss.moonboost</string>
            <key>CFBundleName</key>
            <string>MoonBoost</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>NSMicrophoneUsageDescription</key>
            <string>تضخيم الصوت</string>
        </dict>
        </plist>' > Payload/$APP_NAME.app/Info.plist
        
        zip -r MoonHearBoost.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: MoonHearBoost-IPA
        path: MoonHearBoost.ipa
