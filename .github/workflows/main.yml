name: Build MoonHearBoost

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Theos
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Build App
      run: |
        export THEOS=~/theos
        make package

    - name: Create IPA Bundle
      run: |
        mkdir -p Payload/MoonHearBoost.app
        # نسخ الملف التنفيذي
        cp .theos/obj/MoonHearBoost.app/MoonHearBoost Payload/MoonHearBoost.app/
        
        # صنع ملف الإعدادات تلقائياً (حل مشكلة الصورة 11)
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>MoonHearBoost</string>
            <key>CFBundleIdentifier</key>
            <string>com.huss.moonboost</string>
            <key>CFBundleName</key>
            <string>MoonBoost</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>NSMicrophoneUsageDescription</key>
            <string>نحتاج المايكروفون للتضخيم</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>14.0</string>
        </dict>
        </plist>' > Payload/MoonHearBoost.app/Info.plist
        
        zip -r MoonHearBoost.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: MoonHearBoost-IPA
        path: MoonHearBoost.ipa
